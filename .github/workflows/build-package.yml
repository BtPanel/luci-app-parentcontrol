name: Build and Release luci-app-parentcontrol

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      SDK_URL: "https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
      SDK_DIR: "openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64"
      APP_NAME: "luci-app-parentcontrol"

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 安装依赖
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync unzip file curl zstd

      # 3. 下载并解压 SDK
      - name: Download and extract OpenWrt SDK
        run: |
          wget $SDK_URL
          unzstd -c ${SDK_DIR}.tar.zst | tar -x
          ls -l $SDK_DIR

      # 4. 拷贝 LuCI App 和语言包到 SDK
      - name: Copy LuCI app to SDK
        run: |
          mkdir -p ./$SDK_DIR/package/luci-app-parentcontrol
          cp -r $GITHUB_WORKSPACE/* ./$SDK_DIR/package/luci-app-parentcontrol/

      # 5. 更新 feeds
      - name: Update and install feeds
        run: |
          cd $SDK_DIR
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 6. 编译主插件
      - name: Build main app
        run: |
          cd $SDK_DIR
          make package/${APP_NAME}/compile V=s

      # 7. 编译中文语言包
      - name: Build Chinese language pack
        run: |
          cd $SDK_DIR
          make package/${APP_NAME}-luci-i18n-zh-cn/compile V=s || echo "Language pack may not exist, continuing"

      # 8. 收集生成的 ipk
      - name: Collect generated ipk
        run: |
          cd $SDK_DIR/bin/packages
          mkdir -p $GITHUB_WORKSPACE/output
          find . -name "${APP_NAME}_*.ipk" -exec cp {} $GITHUB_WORKSPACE/output/ \;
          find . -name "${APP_NAME}-luci-i18n-zh-cn_*.ipk" -exec cp {} $GITHUB_WORKSPACE/output/ \;

      # 9. 设置版本号
      - name: Set version
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          if [ "$TAG" = "v0.0.0" ]; then
            VERSION="1.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${TAG#v}"
            PATCH=$((PATCH+1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version set to $VERSION"

      # 10. 创建 Release
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: "Release v${{ steps.version.outputs.version }} - 主插件和中文语言包"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 11. 上传 ipk 文件到 Release
      - name: Upload IPKs to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./output
          asset_name: parentcontrol-ipks.zip
          asset_content_type: application/zip
