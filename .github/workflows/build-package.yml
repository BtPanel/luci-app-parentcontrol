name: Build and Release Multi-Arch ZIPs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            path: x86/64
            sdk_name: x86-64_gcc-13.3.0_musl.Linux-x86_64
          - arch: aarch64_generic
            path: armsr/armv8
            sdk_name: armsr-armv8_gcc-13.3.0_musl.Linux-x86_64
          - arch: mipsel_24kc
            path: ramips/mt7621
            sdk_name: ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev zip gawk

      - name: Download and Extract SDK
        run: |
          # 直接在 run 中使用 GitHub Actions 的表达式语法，避免 Shell 变量引用错误
          SDK_URL="https://openwrt.org{{ matrix.path }}/openwrt-sdk-24.10.0-${{ matrix.sdk_name }}.tar.xz"
          echo "Downloading from $SDK_URL"
          curl -L "$SDK_URL" | tar -xJ --strip-components=1

      - name: Update and Install Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add Package to SDK
        run: |
          mkdir -p package/luci-app-parentcontrol
          cp -r $GITHUB_WORKSPACE/* package/luci-app-parentcontrol/

      - name: Get Package Version
        id: get_version
        run: |
          V=$(grep "PKG_VERSION:=" package/luci-app-parentcontrol/Makefile | cut -d '=' -f2 | xargs)
          V=${V:-1.0}
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Configure and Compile
        run: |
          make defconfig
          echo "CONFIG_PACKAGE_luci-app-parentcontrol=m" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          make defconfig
          make package/luci-app-parentcontrol/compile V=s

      - name: Pack to ZIP
        run: |
          mkdir -p release_files
          VERSION=${{ steps.get_version.outputs.version }}
          ARCH=${{ matrix.arch }}
          find bin/packages/ -name "luci-app-parentcontrol*.ipk" -exec cp {} release_files/ \;
          zip -j "v${VERSION}_${ARCH}.zip" release_files/*.ipk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.arch }}
          path: "*.zip"

  release:
    name: Create Release and Upload
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: .
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'latest' }}
          name: Release ${{ github.ref_name || 'Manual Build' }}
          body: |
            ## ParentControl 自动编译版 (OpenWrt 24.10+)
            - 包含多架构主程序与简体中文包
            - 适配 Firewall4 (nftables)
          draft: false
          prerelease: false
          files: "*.zip"
