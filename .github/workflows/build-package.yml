name: Build and Release luci-app-parentcontrol

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      SDK_URL: "https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
      SDK_DIR: "openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64"
      APP_NAME: "luci-app-parentcontrol"
      BUILD_DIR: "/tmp/openwrt-build"

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 安装依赖
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync unzip file curl zstd

      # 3. 创建独立构建目录
      - name: Create build directory
        run: |
          mkdir -p $BUILD_DIR
          echo "Build directory: $BUILD_DIR"

      # 4. 下载并解压 SDK 到独立目录
      - name: Download and extract SDK
        run: |
          cd $BUILD_DIR
          wget $SDK_URL
          unzstd -c ${SDK_DIR}.tar.zst | tar -x
          ls -l $BUILD_DIR/$SDK_DIR

      # 5. 拷贝 LuCI App 到 SDK package
      - name: Copy LuCI app to SDK
        run: |
          mkdir -p $BUILD_DIR/$SDK_DIR/package/$APP_NAME
          rsync -av --exclude=$SDK_DIR/ $GITHUB_WORKSPACE/ $BUILD_DIR/$SDK_DIR/package/$APP_NAME/

      # 6. 更新 feeds
      - name: Update and install feeds
        run: |
          cd $BUILD_DIR/$SDK_DIR
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 7. 编译主插件 + 中文语言包（非交互、单线程）
      - name: Build main app and language pack
        run: |
          cd $BUILD_DIR/$SDK_DIR
          export TERM=dumb
          # 生成默认 .config 避免 menuconfig
          make defconfig
          # 单线程编译主插件
          make package/${APP_NAME}/compile V=s -j1
          # 单线程编译语言包，若不存在也不报错
          make package/${APP_NAME}-luci-i18n-zh-cn/compile V=s -j1 || true

      # 8. 收集 ipk
      - name: Collect IPK files
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          find $BUILD_DIR/$SDK_DIR/bin/packages -name "${APP_NAME}_*.ipk" -exec cp {} $GITHUB_WORKSPACE/output/ \;
          find $BUILD_DIR/$SDK_DIR/bin/packages -name "${APP_NAME}-luci-i18n-zh-cn_*.ipk" -exec cp {} $GITHUB_WORKSPACE/output/ \;

      # 9. 设置版本号
      - name: Set version
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          if [ "$TAG" = "v0.0.0" ]; then
            VERSION="1.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${TAG#v}"
            PATCH=$((PATCH+1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version set to $VERSION"

      # 10. 创建 Release
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: "Release v${{ steps.version.outputs.version }} - 主插件和中文语言包"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 11. 上传 ipk 文件到 Release
      - name: Upload IPKs to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./output
          asset_name: parentcontrol-ipks.zip
          asset_content_type: application/zip
